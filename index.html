<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cold Email Generator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .container { background: white; padding: 40px; border-radius: 12px; width: 500px; box-shadow: 0 2px 20px rgba(0,0,0,0.1); }
    h1 { margin-bottom: 24px; font-size: 24px; }
    input, textarea { width: 100%; padding: 12px; margin-bottom: 16px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
    button { width: 100%; padding: 14px; background: #000; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
    button:hover { background: #333; }
    #result { margin-top: 24px; padding: 16px; background: #f9f9f9; border-radius: 8px; white-space: pre-wrap; display: none; }
    #loading { display: none; text-align: center; margin-top: 16px; color: #666; }
  </style>
</head>
<body>
  <div class="container">
    <h1 id="title">Cold Email Generator</h1>
    <input type="text" id="company" placeholder="Название компании" />
    <textarea id="offer" rows="4" placeholder="Что ты предлагаешь?"></textarea>
    <select id="language" onchange="switchLanguage()"style="width:100%; padding:12px; margin-bottom:16px; border:1px solid #ddd; border-radius:8px; font-size:16px;">
        <option value="ru">Русский</option>
        <option value="en">English</option>
      </select>
      <button id="btn" onclick="generate()">Сгенерировать письмо</button>
    <div id="loading">Генерируем...</div>
    <div id="result"></div>
  </div>

  <script>
    const translations = {
      ru: {
        title: 'Cold Email Generator',
        company: 'Название компании',
        offer: 'Что ты предлагаешь?',
        button: 'Сгенерировать письмо',
        loading: 'Генерируем...',
        error: 'Заполни все поля',
        serverError: 'Ошибка соединения с сервером'
      },
      en: {
        title: 'Cold Email Generator',
        company: 'Company name',
        offer: 'What are you offering?',
        button: 'Generate email',
        loading: 'Generating...',
        error: 'Fill in all fields',
        serverError: 'Server connection error'
      }
    };
  
    function switchLanguage() {
      const lang = document.getElementById('language').value;
      const t = translations[lang];
      document.getElementById('title').textContent = t.title;
      document.getElementById('company').placeholder = t.company;
      document.getElementById('offer').placeholder = t.offer;
      document.getElementById('btn').textContent = t.button;
    }
  
    async function generate() {
      const company = document.getElementById('company').value;
      const offer = document.getElementById('offer').value;
      const language = document.getElementById('language').value;
      const t = translations[language];
  
      if (!company || !offer) {
        alert(t.error);
        return;
      }
  
      document.getElementById('loading').style.display = 'block';
      document.getElementById('result').style.display = 'none';
  
      try {
        const response = await fetch('https://cold-email-generator-ivjl.onrender.com/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ company, offer, language })
        });
  
        const data = await response.json();
        document.getElementById('result').style.display = 'block';
        document.getElementById('result').textContent = data.email || data.error;
      } catch (error) {
        alert(t.serverError);
      } finally {
        document.getElementById('loading').style.display = 'none';
      }
    }
  </script>
</body>
</html>
