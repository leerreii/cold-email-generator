<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cold Email Generator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .container { background: white; padding: 40px; border-radius: 12px; width: 500px; box-shadow: 0 2px 20px rgba(0,0,0,0.1); }
    h1 { margin-bottom: 24px; font-size: 24px; }
    input, textarea, select { width: 100%; padding: 12px; margin-bottom: 16px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
    button { width: 100%; padding: 14px; background: #000; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; margin-bottom: 8px; }
    button:hover { background: #333; }
    .secondary { background: white; color: #000; border: 1px solid #000; }
    .secondary:hover { background: #f5f5f5; }
    #result { margin-top: 24px; padding: 16px; background: #f9f9f9; border-radius: 8px; white-space: pre-wrap; display: none; }
    #loading { display: none; text-align: center; margin-top: 16px; color: #666; }
    #generations { margin-bottom: 16px; color: #666; font-size: 14px; }
    #auth-screen { display: block; }
    #main-screen { display: none; }
    .error { color: red; font-size: 14px; margin-bottom: 12px; }
    #upgrade-btn { background: #f5a623; color: white; border: none; display: none; }
    #upgrade-btn:hover { background: #e09515; }
  </style>
</head>
<body>
  <div class="container">

    <div id="auth-screen">
      <h1>Cold Email Generator</h1>
      <p style="margin-bottom:24px; color:#666;">Введи email чтобы начать</p>
      <input type="email" id="auth-email" placeholder="твой@email.com" />
      <div id="auth-error" class="error"></div>
      <button onclick="login()">Войти</button>
      <button class="secondary" onclick="register()">Зарегистрироваться</button>
    </div>

    <div id="main-screen">
      <h1 id="title">Cold Email Generator</h1>
      <div id="generations"></div>
      <input type="text" id="company" placeholder="Название компании" />
      <textarea id="offer" rows="4" placeholder="Что ты предлагаешь?"></textarea>
      <select id="language" onchange="switchLanguage()">
        <option value="ru">Русский</option>
        <option value="en">English</option>
      </select>
      <button id="btn" onclick="generate()">Сгенерировать письмо</button>
      <button id="upgrade-btn" onclick="upgrade()">⭐ Купить подписку — $9/мес</button>
      <button class="secondary" onclick="logout()">Выйти</button>
      <div id="loading"></div>
      <div id="result"></div>
    </div>

  </div>

  <script>
    const API = 'https://cold-email-generator-ivjl.onrender.com';

    const translations = {
      ru: {
        title: 'Cold Email Generator',
        company: 'Название компании',
        offer: 'Что ты предлагаешь?',
        button: 'Сгенерировать письмо',
        loading: 'Генерируем...',
        error: 'Заполни все поля',
        serverError: 'Ошибка соединения с сервером',
        limit: 'Лимит исчерпан. Купи подписку.',
        upgrade: '⭐ Купить подписку — $9/мес'
      },
      en: {
        title: 'Cold Email Generator',
        company: 'Company name',
        offer: 'What are you offering?',
        button: 'Generate email',
        loading: 'Generating...',
        error: 'Fill in all fields',
        serverError: 'Server connection error',
        limit: 'Limit reached. Buy a subscription.',
        upgrade: '⭐ Buy subscription — $9/mo'
      }
    };

    let currentUser = null;

    window.onload = () => {
      const saved = localStorage.getItem('user');
      if (saved) {
        currentUser = JSON.parse(saved);
        showMainScreen();
      }
    };

    function showMainScreen() {
      document.getElementById('auth-screen').style.display = 'none';
      document.getElementById('main-screen').style.display = 'block';
      updateGenerations();
    }

    function updateGenerations() {
      const el = document.getElementById('generations');
      if (currentUser.is_paid) {
        el.textContent = '✓ Безлимитный доступ';
        document.getElementById('upgrade-btn').style.display = 'none';
      } else {
        el.textContent = `Осталось генераций: ${currentUser.generations_left}`;
        if (currentUser.generations_left <= 0) {
          document.getElementById('upgrade-btn').style.display = 'block';
        }
      }
    }

    async function register() {
      const email = document.getElementById('auth-email').value;
      if (!email) return;

      const res = await fetch(`${API}/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email })
      });

      const data = await res.json();
      if (data.error) {
        document.getElementById('auth-error').textContent = data.error;
        return;
      }

      currentUser = data.user;
      localStorage.setItem('user', JSON.stringify(currentUser));
      showMainScreen();
    }

    async function login() {
      const email = document.getElementById('auth-email').value;
      if (!email) return;

      const res = await fetch(`${API}/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email })
      });

      const data = await res.json();
      if (data.error) {
        document.getElementById('auth-error').textContent = data.error;
        return;
      }

      currentUser = data.user;
      localStorage.setItem('user', JSON.stringify(currentUser));
      showMainScreen();
    }

    function logout() {
      currentUser = null;
      localStorage.removeItem('user');
      document.getElementById('auth-screen').style.display = 'block';
      document.getElementById('main-screen').style.display = 'none';
    }

    function switchLanguage() {
      const lang = document.getElementById('language').value;
      const t = translations[lang];
      document.getElementById('title').textContent = t.title;
      document.getElementById('company').placeholder = t.company;
      document.getElementById('offer').placeholder = t.offer;
      document.getElementById('btn').textContent = t.button;
      document.getElementById('upgrade-btn').textContent = t.upgrade;
    }

    async function upgrade() {
      const language = document.getElementById('language').value;
      const t = translations[language];

      const res = await fetch(`${API}/checkout`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: currentUser.email })
      });

      const data = await res.json();
      if (data.url) {
        window.open(data.url, '_blank');
      } else {
        alert(t.serverError);
      }
    }

    async function generate() {
      const company = document.getElementById('company').value;
      const offer = document.getElementById('offer').value;
      const language = document.getElementById('language').value;
      const t = translations[language];

      if (!company || !offer) {
        alert(t.error);
        return;
      }

      document.getElementById('loading').style.display = 'block';
      document.getElementById('loading').textContent = t.loading;
      document.getElementById('result').style.display = 'none';

      try {
        const response = await fetch(`${API}/generate`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ company, offer, language, email: currentUser.email })
        });

        const data = await response.json();

        if (data.error) {
          document.getElementById('result').style.display = 'block';
          document.getElementById('result').textContent = data.error === 'limit exceeded. buy a subscription.'
            ? t.limit
            : data.error;
          document.getElementById('upgrade-btn').style.display = 'block';
          return;
        }

        if (data.generations_left !== 'unlimited') {
          currentUser.generations_left = data.generations_left;
          localStorage.setItem('user', JSON.stringify(currentUser));
          updateGenerations();
        }

        document.getElementById('result').style.display = 'block';
        document.getElementById('result').textContent = data.email;
      } catch (error) {
        alert(t.serverError);
      } finally {
        document.getElementById('loading').style.display = 'none';
      }
    }
  </script>
</body>
</html>
